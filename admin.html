




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAVANA STORE ADMIN</title>
  <meta name="description" content="MAISON admin dashboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="assets/logo.png" alt="MAISON Admin">
      </div>

      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="#" data-page="dashboard" class="admin-nav-item active" onclick="navigateAdmin('dashboard'); return false;">
          <span class="admin-nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          Dashboard
        </a>
        <a href="#" data-page="orders" class="admin-nav-item" onclick="navigateAdmin('orders'); return false;">
          <span class="admin-nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l-2 4v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6l-2-4H6z"/><line x1="2.25" y1="4.5" x2="20.25" y2="4.5"/><path d="M12 6.75a3.75 3.75 0 1 0 0 7.5a3.75 3.75 0 0 0 0-7.5z"/></svg>
          </span>
          Orders
        </a>
        <a href="#" data-page="products" class="admin-nav-item" onclick="navigateAdmin('products'); return false;">
          <span class="admin-nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"/><polyline points="7 10 7 10 7 10"/><polyline points="9 16 13 12 17 16"/></svg>
          </span>
          Products
        </a>
        <a href="#" data-page="customers" class="admin-nav-item" onclick="navigateAdmin('customers'); return false;">
          <span class="admin-nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          Customers
        </a>
      </nav>

      <div class="admin-sidebar-bottom">
        <button class="btn btn-outline admin-signout" type="button" onclick="signOut()">Sign Out</button>
      </div>
    </aside>

    <main class="admin-content">
      <div class="admin-page-head">
        <h1 id="adminTitle">Dashboard</h1>
        <div class="admin-subtitle" id="adminSubtitle">Overview of orders, stock, and customers.</div>
      </div>

      <div id="adminApp" class="admin-app"></div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="adminToast" style="right:auto; left:24px; bottom:24px"></div>

  <!-- Modal -->
  <div class="admin-modal-overlay" id="adminModalOverlay" style="display:none">
    <div class="admin-modal" onclick="event.stopPropagation()">
      <div class="admin-modal-header">
        <div>
          <div class="admin-modal-title" id="adminModalTitle">Modal</div>
          <div class="admin-modal-subtitle" id="adminModalSubtitle"></div>
        </div>
        <button class="admin-modal-close" type="button" onclick="closeAdminModal()">✕</button>
      </div>
      <div class="admin-modal-body" id="adminModalBody"></div>
    </div>
  </div>

  <script src="store-data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
